<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مين فينا؟ - تحدي الـ 500 سؤال</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen" class="auth-overlay">
        <div class="auth-card">
            <div class="main-q-mark">❓</div>
            <h2>مين فينا؟ ⚡</h2>
            <p>تحدي ذكريات الطفولة (500 سؤال)</p>
            <div class="input-group">
                <input type="email" id="email" placeholder="البريد الإلكتروني">
            </div>
            <button onclick="handleAuth()" class="main-btn">دخول سريع</button>
        </div>
    </div>

    <div id="game-container" class="app-wrapper" style="display:none;">
        <header class="wa-header">
            <div class="avatar">❓</div>
            <div class="user-meta">
                <h3>بوت التحديات 🤖</h3>
                <p id="typing-status">متصل الآن</p>
            </div>
            <button onclick="logout()" class="logout-btn">خروج</button>
        </header>

        <div class="info-bar">
            <div class="streak-badge">🔥 استريك: <span id="streak-count">0</span></div>
            <div class="total-votes">👥 اللاعبين الآن: <span id="fake-online">1,240</span></div>
        </div>

        <main class="chat-screen" id="chat-display"></main>

        <footer class="input-area">
            <div id="vote-stats" class="vote-stats" style="display: none;">
                <div class="stat-item">الخيار (أ): <span id="stat-a">0</span>%</div>
                <div class="stat-item">الخيار (ب): <span id="stat-b">0</span>%</div>
            </div>
            <div class="btn-group">
                <button class="answer-btn" onclick="userReply('A')" id="btn-a"></button>
                <button class="answer-btn" onclick="userReply('B')" id="btn-b"></button>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
