<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مين فينا؟ - تحدي الـ 500 سؤال</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen" class="auth-overlay">
        <div class="auth-card">
            <div class="main-q-mark">❓</div>
            <h2 id="auth-title">تسجيل الدخول</h2>
            <p>تحدي "مين فينا؟" لذكريات الطفولة</p>
            
            <div class="input-group">
                <input type="text" id="username" placeholder="اسم المستخدم">
                <input type="password" id="password" placeholder="كلمة السر">
            </div>

            <div id="auth-buttons">
                <button onclick="handleLogin()" class="main-btn">دخول</button>
                <button onclick="toggleAuth(true)" class="link-btn" id="go-to-signup">ليس لديك حساب؟ إنشاء حساب</button>
            </div>

            <div id="signup-buttons" style="display:none;">
                <button onclick="handleSignup()" class="main-btn signup">إنشاء حساب جديد</button>
                <button onclick="toggleAuth(false)" class="link-btn">لديك حساب بالفعل؟ دخول</button>
            </div>
        </div>
    </div>

    <div id="game-container" class="app-wrapper" style="display:none;">
        <header class="wa-header">
            <div class="avatar">❓</div>
            <div class="user-meta">
                <h3>مين فينا؟</h3>
                <p id="typing-status">متصل الآن</p>
            </div>
            <button onclick="logout()" class="logout-btn">خروج</button>
        </header>

        <div class="info-bar">
            <div class="streak-badge">🔥 استريك: <span id="streak-count">0</span></div>
            <div class="total-votes">👥 أونلاين: <span id="fake-online">1,402</span></div>
        </div>

        <main class="chat-screen" id="chat-display"></main>

        <footer class="input-area">
            <div id="vote-stats" class="vote-stats" style="display: none;">
                <div class="stat-item"> (أ): <span id="stat-a">0</span>%</div>
                <div class="stat-item"> (ب): <span id="stat-b">0</span>%</div>
            </div>
            
            <div class="btn-group" id="answer-buttons">
                <button class="answer-btn" onclick="userReply('A')" id="btn-a"></button>
                <button class="answer-btn" onclick="userReply('B')" id="btn-b"></button>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
